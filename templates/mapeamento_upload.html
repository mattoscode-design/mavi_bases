{% extends "base.html" %} {% block title %}Configurar Mapeamento{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Configurar mapeamento</h1>
  <p>Envie uma base de exemplo para configurar como ela deve ser tratada</p>
</div>

<div class="card">
  <form
    id="form-mapeamento"
    action="/mapeamento/ler-colunas"
    method="post"
    enctype="multipart/form-data"
  >
    <div class="field">
      <label>Varejista</label>
      <input
        type="text"
        id="inp-varejista"
        placeholder="Digite o nome do varejista..."
        autocomplete="off"
      />
      <input type="hidden" name="cod_varejista" id="cod-varejista-hidden" />
      <div
        id="sugestoes"
        style="
          display: none;
          border: 0.5px solid var(--color-border-secondary);
          border-radius: var(--border-radius-md);
          background: var(--color-background-primary);
          margin-top: 4px;
          max-height: 200px;
          overflow-y: auto;
        "
      ></div>
    </div>

    <div class="field">
      <label>Base de exemplo</label>
      <div class="dropzone" id="dropzone">
        <div class="dz-icon">📂</div>
        <div class="dz-text">Clique ou arraste o arquivo aqui</div>
        <div class="dz-sub">.xlsx ou .xls</div>
        <div class="dz-filename" id="dz-filename"></div>
      </div>
      <input
        type="file"
        id="arquivo"
        name="arquivo"
        accept=".xlsx,.xls"
        style="display: none"
      />
    </div>

    <button type="button" class="btn-primary" onclick="submeterForm()">
      Ler colunas →
    </button>
  </form>
</div>

<script>
  window.VAREJISTAS = [
    {% for v in varejistas %}
    { cod: {{ v.cod_varejista }}, nome: "{{ v.nome_varejista }}" },
    {% endfor %}
  ];

  function submeterForm() {
    const cod = document.getElementById("cod-varejista-hidden").value;
    if (!cod) { alert("Selecione um varejista da lista antes de continuar."); return; }
    const arquivo = document.getElementById("arquivo").files[0];
    if (!arquivo) { alert("Selecione um arquivo antes de continuar."); return; }
    document.getElementById("form-mapeamento").submit();
  }
</script>
<script src="/static/js/dropzone.js"></script>
<script src="/static/js/autocomplete.js"></script>

{% endblock %}

{% extends "base.html" %} {% block title %}Upload de Base{% endblock %} {% block
content %}

<div class="page-header">
  <h1>Upload de Base</h1>
  <p>Envie a base do cliente para processamento automático</p>
</div>

<div class="card">
  <form
    action="/upload"
    method="post"
    enctype="multipart/form-data"
    id="form-upload"
  >
    <div class="field">
      <label>Varejista</label>
      <input
        type="text"
        id="inp-varejista"
        placeholder="Digite o nome do varejista..."
        autocomplete="off"
      />
      <input type="hidden" name="cod_varejista" id="cod-varejista-hidden" />
      <input type="hidden" name="nome_varejista" id="nome-varejista-hidden" />
      <div
        id="sugestoes"
        style="
          display: none;
          border: 0.5px solid var(--color-border-secondary);
          border-radius: var(--border-radius-md);
          background: var(--color-background-primary);
          margin-top: 4px;
          max-height: 200px;
          overflow-y: auto;
        "
      ></div>
    </div>

    <div class="field">
      <label>Arquivo Excel</label>
      <div class="dropzone" id="dropzone">
        <div class="dz-icon">📂</div>
        <div class="dz-text">Clique ou arraste o arquivo aqui</div>
        <div class="dz-sub">.xlsx ou .xls</div>
        <div class="dz-filename" id="dz-filename"></div>
      </div>
      <input
        type="file"
        id="arquivo"
        name="arquivo"
        accept=".xlsx,.xls"
        style="display: none"
      />
    </div>

    <button
      type="button"
      class="btn-primary"
      id="btn-enviar"
      onclick="submeterUpload()"
    >
      Processar Base
    </button>
  </form>
</div>

<script>
  window.VAREJISTAS = [
    {% for v in varejistas %}
    { cod: {{ v.cod_varejista }}, nome: "{{ v.nome_varejista }}" },
    {% endfor %}
  ];
</script>
<script src="/static/js/dropzone.js"></script>
<script src="/static/js/autocomplete.js"></script>
<script src="/static/js/upload.js"></script>

{% endblock %}
